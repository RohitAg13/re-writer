name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug. Please don't paste your API key anywhere in this issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Select '...'
        3. Right-click → Rewrite → '...'
        4. Observed '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: chrome
    attributes:
      label: Chrome version
      placeholder: e.g. 130.0.6723.92
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14.5, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Vercel AI Gateway
        - OpenRouter
        - Custom (OpenAI-compatible)
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      placeholder: e.g. anthropic/claude-sonnet-4
  - type: textarea
    id: console
    attributes:
      label: Service worker / console output
      description: Open `chrome://extensions` → click "service worker" under Inspect views → paste any errors here. Redact secrets.
      render: shell
