<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Voice Rewriter — streaming preview popover demo">
  <title>Voice Rewriter — streaming preview popover</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#0f1216"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11151a"/>
      <stop offset="100%" stop-color="#0f1216"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="typeReveal">
      <rect x="0" y="0" width="0" height="220">
        <animate attributeName="width" values="0;640;640;640" keyTimes="0;0.55;0.95;1" dur="6s" begin="0.4s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="300" rx="700" ry="380" fill="url(#glow)"/>

  <!-- subtle dot grid -->
  <g fill="#1f2937" opacity="0.55">
    <g>
      <!-- generated by hand to keep the SVG small -->
      <circle cx="60" cy="60" r="1"/><circle cx="120" cy="60" r="1"/><circle cx="180" cy="60" r="1"/><circle cx="240" cy="60" r="1"/><circle cx="300" cy="60" r="1"/><circle cx="360" cy="60" r="1"/><circle cx="420" cy="60" r="1"/><circle cx="480" cy="60" r="1"/><circle cx="540" cy="60" r="1"/><circle cx="600" cy="60" r="1"/><circle cx="660" cy="60" r="1"/><circle cx="720" cy="60" r="1"/><circle cx="780" cy="60" r="1"/><circle cx="840" cy="60" r="1"/><circle cx="900" cy="60" r="1"/><circle cx="960" cy="60" r="1"/><circle cx="1020" cy="60" r="1"/><circle cx="1080" cy="60" r="1"/><circle cx="1140" cy="60" r="1"/>
      <circle cx="60" cy="120" r="1"/><circle cx="180" cy="120" r="1"/><circle cx="300" cy="120" r="1"/><circle cx="420" cy="120" r="1"/><circle cx="540" cy="120" r="1"/><circle cx="660" cy="120" r="1"/><circle cx="780" cy="120" r="1"/><circle cx="900" cy="120" r="1"/><circle cx="1020" cy="120" r="1"/><circle cx="1140" cy="120" r="1"/>
      <circle cx="60" cy="570" r="1"/><circle cx="180" cy="570" r="1"/><circle cx="300" cy="570" r="1"/><circle cx="420" cy="570" r="1"/><circle cx="540" cy="570" r="1"/><circle cx="660" cy="570" r="1"/><circle cx="780" cy="570" r="1"/><circle cx="900" cy="570" r="1"/><circle cx="1020" cy="570" r="1"/><circle cx="1140" cy="570" r="1"/>
    </g>
  </g>

  <!-- header tagline -->
  <text x="600" y="80" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="700" fill="#f3f4f6" letter-spacing="-0.5">
    Right-click. Rewrite. In your voice.
  </text>
  <text x="600" y="110" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" fill="#9ca3af">
    A Chrome extension that streams the rewrite back into a popover and won't make you sound like an AI.
  </text>

  <!-- right-click menu (decorative, off to the left) -->
  <g transform="translate(80,210)" filter="url(#shadow)">
    <rect width="220" height="220" rx="10" fill="#0f1216" stroke="#1f2937"/>
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#cbd5e1">
      <text x="14" y="32">Cut</text>
      <text x="14" y="58">Copy</text>
      <text x="14" y="84">Paste</text>
      <line x1="10" y1="100" x2="210" y2="100" stroke="#1f2937"/>
      <g>
        <rect x="6" y="110" width="208" height="30" rx="6" fill="#1e3a8a" fill-opacity="0.35"/>
        <text x="14" y="130" fill="#93c5fd" font-weight="600">Rewrite</text>
        <text x="200" y="130" text-anchor="end" fill="#93c5fd">▸</text>
      </g>
      <text x="14" y="166">Inspect</text>
      <text x="14" y="192">Save as…</text>
    </g>
  </g>

  <!-- arrow from menu to popover -->
  <g stroke="#374151" stroke-width="1.5" fill="none">
    <path d="M 310 320 C 360 320, 380 330, 420 330" stroke-dasharray="3 3"/>
    <polygon points="420,326 432,330 420,334" fill="#374151" stroke="none"/>
  </g>

  <!-- popover -->
  <g transform="translate(440,180)" filter="url(#shadow)">
    <rect width="700" height="320" rx="14" fill="url(#panel)" stroke="#1f2937" stroke-width="1"/>

    <!-- header -->
    <g>
      <rect x="0.5" y="0.5" width="699" height="48" rx="14" fill="none"/>
      <g transform="translate(20,14)">
        <rect width="68" height="22" rx="999" fill="#1e3a8a" fill-opacity="0.45"/>
        <text x="34" y="15" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
              font-size="12" fill="#93c5fd" font-weight="600">Refine</text>
      </g>
      <text x="104" y="30"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="14" font-weight="600" fill="#e5e7eb">Rewrite</text>
      <text x="672" y="32"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="22" fill="#6b7280">×</text>
    </g>
    <line x1="0" y1="48" x2="700" y2="48" stroke="#1f2937"/>

    <!-- streaming output (typed-in via clip-path) -->
    <g transform="translate(22,58)">
      <g clip-path="url(#typeReveal)">
        <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
              font-size="15" fill="#e5e7eb">
          <tspan x="0" dy="22">Quick follow-up on yesterday's discussion. The owner</tspan>
          <tspan x="0" dy="24">and date for each action item are below — let me know</tspan>
          <tspan x="0" dy="24">if anything looks off, and I'll adjust before we ship.</tspan>
        </text>
      </g>
      <!-- caret follows the reveal -->
      <rect y="8" width="2" height="18" fill="#9ca3af">
        <animate attributeName="x" values="0;640;640;640" keyTimes="0;0.55;0.95;1" dur="6s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="y" values="8;8;32;56;56" keyTimes="0;0.18;0.4;0.55;1" dur="6s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- footer -->
    <line x1="0" y1="252" x2="700" y2="252" stroke="#1f2937"/>
    <g transform="translate(0,252)">
      <text x="22" y="40"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="12" fill="#16a34a">
        Streaming…
        <animate attributeName="opacity" values="1;0.4;1" dur="1.4s" repeatCount="indefinite"/>
      </text>
      <g transform="translate(420,18)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="12">
        <g>
          <rect width="60" height="32" rx="8" fill="transparent" stroke="#374151"/>
          <text x="30" y="20" text-anchor="middle" fill="#cbd5e1">Retry</text>
        </g>
        <g transform="translate(72,0)">
          <rect width="76" height="32" rx="8" fill="transparent" stroke="#374151"/>
          <text x="38" y="20" text-anchor="middle" fill="#cbd5e1">Discard</text>
        </g>
        <g transform="translate(160,0)">
          <rect width="100" height="32" rx="8" fill="#2563eb"/>
          <text x="38" y="20" text-anchor="middle" fill="#ffffff" font-weight="600">Accept</text>
          <text x="80" y="20" text-anchor="middle" fill="#bfdbfe" font-size="11">↵</text>
        </g>
      </g>
    </g>
  </g>

  <!-- footer chips -->
  <g transform="translate(0,560)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#9ca3af">
    <g transform="translate(310,0)">
      <rect width="160" height="30" rx="999" fill="#0f1216" stroke="#1f2937"/>
      <text x="80" y="20" text-anchor="middle">Streaming preview</text>
    </g>
    <g transform="translate(490,0)">
      <rect width="160" height="30" rx="999" fill="#0f1216" stroke="#1f2937"/>
      <text x="80" y="20" text-anchor="middle">Mimics your voice</text>
    </g>
    <g transform="translate(670,0)">
      <rect width="220" height="30" rx="999" fill="#0f1216" stroke="#1f2937"/>
      <text x="110" y="20" text-anchor="middle">Backend-agnostic gateway</text>
    </g>
  </g>
</svg>
